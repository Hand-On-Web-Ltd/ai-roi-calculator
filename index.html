<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROI Calculator — Hand On Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 560px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .hint {
            color: #888;
            font-size: 0.8rem;
            font-weight: 400;
        }
        input[type="number"], input[type="range"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #4f46e5;
        }
        input[type="range"] {
            padding: 0;
            border: none;
            margin-top: 8px;
        }
        .range-value {
            text-align: center;
            font-weight: 700;
            color: #4f46e5;
            font-size: 1.1rem;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 28px;
            transition: background 0.2s;
        }
        button:hover { background: #4338ca; }
        .results {
            display: none;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #f0f0f0;
        }
        .results h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #1a1a2e;
        }
        .result-card {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            text-align: center;
        }
        .result-card .amount {
            font-size: 2rem;
            font-weight: 800;
            color: #4f46e5;
        }
        .result-card .label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .result-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .cta {
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            background: #fef9c3;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .cta a {
            color: #4f46e5;
            font-weight: 600;
            text-decoration: none;
        }
        .cta a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #aaa;
        }
        footer a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 AI ROI Calculator</h1>
        <p class="subtitle">See how much your business could save by automating repetitive tasks.</p>

        <label>Number of employees doing repetitive tasks</label>
        <input type="number" id="employees" value="5" min="1" max="1000">

        <label>Hours per week on repetitive tasks <span class="hint">(per employee)</span></label>
        <input type="number" id="hours" value="10" min="1" max="40">

        <label>Average hourly cost (£) <span class="hint">(salary + overheads)</span></label>
        <input type="number" id="rate" value="25" min="5" max="500">

        <label>Automation rate <span class="hint">— how much can be automated?</span></label>
        <input type="range" id="autoRate" min="20" max="90" value="60">
        <div class="range-value"><span id="autoRateVal">60</span>%</div>

        <button onclick="calculate()">Calculate My Savings</button>

        <div class="results" id="results">
            <h2>Your Potential Savings</h2>
            <div class="result-row">
                <div class="result-card">
                    <div class="amount" id="monthlySavings">—</div>
                    <div class="label">Per Month</div>
                </div>
                <div class="result-card">
                    <div class="amount" id="yearlySavings">—</div>
                    <div class="label">Per Year</div>
                </div>
            </div>
            <div class="result-card" style="margin-top:12px">
                <div class="amount" id="hoursBack" style="font-size:1.5rem;">—</div>
                <div class="label">Hours freed up per month</div>
            </div>
            <div class="cta">
                Want to see what automation would look like for your business?<br>
                <a href="https://www.handonweb.com" target="_blank">Talk to us at Hand On Web →</a>
            </div>
        </div>

        <footer>
            Built by <a href="https://www.handonweb.com">Hand On Web</a> · Chester, UK
        </footer>
    </div>

    <script>
        const slider = document.getElementById('autoRate');
        const sliderVal = document.getElementById('autoRateVal');
        slider.addEventListener('input', () => sliderVal.textContent = slider.value);

        function calculate() {
            const employees = parseInt(document.getElementById('employees').value) || 0;
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const autoRate = parseInt(slider.value) / 100;

            const weeklyWaste = employees * hours * rate;
            const monthlySaved = weeklyWaste * autoRate * 4.33;
            const yearlySaved = monthlySaved * 12;
            const hoursSaved = employees * hours * autoRate * 4.33;

            document.getElementById('monthlySavings').textContent = '£' + Math.round(monthlySaved).toLocaleString();
            document.getElementById('yearlySavings').textContent = '£' + Math.round(yearlySaved).toLocaleString();
            document.getElementById('hoursBack').textContent = Math.round(hoursSaved).toLocaleString() + ' hours';
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
